# Clippy configuration for IssunDB.
# Applied when running: cargo clippy --workspace
#
# These settings tune project-wide thresholds. Attribute-level overrides
# (#[allow(...)]) should be rare and always carry a comment explaining why.

# Storage functions can be long but must not be convoluted.
cognitive-complexity-threshold = 30

# Minimum supported Rust version (mirrors rust-toolchain.toml).
msrv = "1.85.0"

# Avoid magic numbers in storage key construction; prefer named constants.
# (Lint is "clippy::unreadable_literal" — keep the default warn level.)

# Avoid overly nested match arms in the query executor.
too-many-lines-threshold = 200
