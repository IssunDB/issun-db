[package]
name = "issundb"
description = "IssunDB — embedded graph + vector database for AI/RAG workloads"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
issundb-core = { path = "../issundb-core" }
issundb-cypher = { path = "../issundb-cypher" }
issundb-rag = { path = "../issundb-rag" }

[features]
default = []
graphblas = ["issundb-core/graphblas", "issundb-rag/graphblas"]

[dev-dependencies]
tempfile.workspace = true
serde_json = "1"
rmp-serde.workspace = true
