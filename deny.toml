# cargo-deny configuration for IssunDB.
# Run with: cargo deny check
# Install with: cargo install cargo-deny

[advisories]
# Deny crates with known security vulnerabilities.
version = 2
yanked = "deny"

[licenses]
version = 2
# Licenses that are acceptable for IssunDB dependencies.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
]

[bans]
# Warn on duplicate versions of the same crate; deny more than three copies.
multiple-versions = "warn"
# Deny crates known to be unsound or replaced by better alternatives.
deny = []

[sources]
# Only allow crates from crates.io and path dependencies (workspace members and git submodules).
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
