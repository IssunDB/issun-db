name: Run Linter Checks

on:
  workflow_dispatch:
  schedule: # Run every day at midnight (UTC)
    - cron: '0 0 * * *'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: '1.85.0' # Pinned to project's MSRV
          components: rustfmt, clippy
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang pkg-config libssl-dev

      - name: Check formatting
        run: make format-check

      - name: Check GraphBLAS pin consistency
        run: make check-graphblas-pin

      - name: Run linters
        run: make lint
