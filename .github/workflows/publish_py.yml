name: Publish to PyPI

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build_linux:
    name: Build wheels (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    env:
      NK_TARGET_NEON: '1'
      NK_TARGET_NEONSDOT: '0'
      NK_TARGET_SVE: '0'
      NK_TARGET_SVE2: '0'
      NK_TARGET_SVE2P1: '0'
      NK_TARGET_SVESDOT: '0'
      NK_TARGET_SVEBFDOT: '0'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: '2_28'
          rust-toolchain: '1.85.0'
          working-directory: crates/issundb-py
          args: --release --out dist
          before-script-linux: |
            dnf install -y clang cmake gcc gcc-c++

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: crates/issundb-py/dist/

  build_native:
    name: Build wheels (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    env:
      RUSTUP_TOOLCHAIN: '1.85.0'
      NK_TARGET_NEON: '1'
      NK_TARGET_NEONSDOT: '0'
      NK_TARGET_SVE: '0'
      NK_TARGET_SVE2: '0'
      NK_TARGET_SVE2P1: '0'
      NK_TARGET_SVESDOT: '0'
      NK_TARGET_SVEBFDOT: '0'
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM64 (Apple Silicon)
          - os: macos-14
            target: aarch64-apple-darwin
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          # Windows ARM64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            cflags: "-DNK_TARGET_HASWELL=0 -DNK_TARGET_SKYLAKE=0 -DNK_TARGET_ICELAKE=0 -DNK_TARGET_GENOA=0 -DNK_TARGET_DIAMOND=0 -DNK_TARGET_SAPPHIRE=0 -DNK_TARGET_SAPPHIREAMX=0 -DNK_TARGET_GRANITEAMX=0 -DNK_TARGET_TURIN=0 -DNK_TARGET_ALDER=0 -DNK_TARGET_SIERRA=0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.85.0'
          targets: ${{ matrix.target }}

      - name: Install dependencies (macOS)
        run: |
          brew install libomp
        if: startsWith(matrix.os, 'macos-')

      - name: Configure macOS linker workaround
        if: matrix.os == 'macos-14'
        run: echo "RUSTFLAGS=-C link-arg=-Wl,-ld_classic" >> $GITHUB_ENV

      - name: Build wheel
        run: |
          cd crates/issundb-py
          pip install maturin
          maturin build --release --out dist --target ${{ matrix.target }}
        shell: bash
        env:
          CFLAGS_aarch64_pc_windows_msvc: ${{ matrix.cflags || '' }}
          CFLAGS_aarch64-pc-windows-msvc: ${{ matrix.cflags || '' }}

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: crates/issundb-py/dist/

  publish_to_pypi:
    name: Publish to PyPI
    needs: [build_linux, build_native]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install uv
        run: |
          pip install uv twine

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: wheels
          merge-multiple: true

      - name: Verify wheels
        run: |
          ls -la wheels/
          twine check wheels/*

      - name: Publish wheels to PyPI
        run: |
          twine upload wheels/* -u __token__ -p ${{ secrets.PYPI_API_TOKEN }}
        if: success()
