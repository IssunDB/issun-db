name: Publish to Crates.io

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  call_tests:
    uses: ./.github/workflows/tests.yml

  publish:
    runs-on: ubuntu-latest

    # Try to publish only if the tests pass
    needs: call_tests
    if: success()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: '1.85.0'
          cache: true

      - name: Publish crates to Crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        # Each publishable crate is published individually in dependency order.
        #`cargo publish` blocks until crate is available in the index before returning,
        # so a dependent crate can be published immediately after the crate it depends on.
        run: |
          set -euo pipefail
          for crate in issundb-graphblas-sys issundb-graphblas issundb-core issundb-vector issundb-text issundb-retrieval issundb-cypher issundb; do
            echo "Publishing $crate..."
            cargo publish -p "$crate" --token "$CARGO_REGISTRY_TOKEN"
          done
