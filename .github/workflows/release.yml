name: Create Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  call-tests:
    uses: ./.github/workflows/tests.yml

  create-release:
    name: Create release draft
    runs-on: ubuntu-latest
    needs: call-tests
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_tag: ${{ steps.release_tag.outputs.release_tag }}
    steps:
      - name: Set release tag
        id: release_tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "release_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=draft-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.release_tag.outputs.release_tag }}
          release_name: Release ${{ steps.release_tag.outputs.release_tag }}
          commitish: ${{ github.sha }}
          draft: true
          prerelease: false
          body: |
            ### What's Included

            - `issundb-cli`: IssunDB CLI
            - `issundb-rest`: IssunDB with a REST API server
            - `issundb-mcp`: IssunDB with an MCP server

            Note that the binaries need a working OpenMP runtime to work on your system.
            That means that typically `libgomp` on Linux, `libomp` on macOS, and `vcomp` on Windows, should be installed on your system.

            ### Container Image

            The same release is published as a container image to GHCR:

            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/issundb:${{ steps.release_tag.outputs.release_tag }}
            ```

  build-binaries:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            archive_ext: gz
            content_type: application/gzip
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            archive_ext: gz
            content_type: application/gzip
          - name: macos-arm64
            runner: macos-14
            archive_ext: gz
            content_type: application/gzip
          - name: windows-amd64
            runner: windows-latest
            archive_ext: zip
            content_type: application/zip
          - name: windows-arm64
            runner: windows-11-arm
            archive_ext: zip
            content_type: application/zip
            cflags: "-DNK_TARGET_HASWELL=0 -DNK_TARGET_SKYLAKE=0 -DNK_TARGET_ICELAKE=0 -DNK_TARGET_GENOA=0 -DNK_TARGET_DIAMOND=0 -DNK_TARGET_SAPPHIRE=0 -DNK_TARGET_SAPPHIREAMX=0 -DNK_TARGET_GRANITEAMX=0 -DNK_TARGET_TURIN=0 -DNK_TARGET_ALDER=0 -DNK_TARGET_SIERRA=0"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust (stable)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true
          cache-key: release-${{ matrix.name }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang cmake pkg-config libssl-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        # libomp is the OpenMP runtime Apple Clang links GraphBLAS against;
        # cmake and clang (libclang for bindgen) ship with the runner image.
        run: brew install libomp

      - name: Point bindgen at the runner's libclang (Windows)
        if: runner.os == 'Windows'
        # cmake ships with the Windows runner; the MSVC OpenMP runtime (vcomp)
        # comes with the Visual Studio build tools. bindgen needs libclang from
        # the preinstalled LLVM.
        run: echo "LIBCLANG_PATH=$env:ProgramFiles\LLVM\bin" >> $env:GITHUB_ENV

      - name: Configure macOS linker workaround
        if: matrix.runner == 'macos-14'
        run: echo "RUSTFLAGS=-C link-arg=-Wl,-ld_classic" >> $GITHUB_ENV

      - name: Build release binaries
        run: cargo build --release -p issundb-cli -p issundb-rest -p issundb-mcp
        env:
          CFLAGS_aarch64_pc_windows_msvc: ${{ matrix.cflags || '' }}
          CFLAGS_aarch64-pc-windows-msvc: ${{ matrix.cflags || '' }}

      - name: Package release asset (Unix)
        if: runner.os != 'Windows'
        run: |
          gzip -c target/release/issundb-cli > "issundb-cli-${{ matrix.name }}.${{ matrix.archive_ext }}"
          gzip -c target/release/issundb-mcp > "issundb-mcp-${{ matrix.name }}.${{ matrix.archive_ext }}"
          gzip -c target/release/issundb-rest > "issundb-rest-${{ matrix.name }}.${{ matrix.archive_ext }}"

      - name: Package release asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target\release\issundb-cli.exe" -DestinationPath "issundb-cli-${{ matrix.name }}.${{ matrix.archive_ext }}" -Force
          Compress-Archive -Path "target\release\issundb-mcp.exe" -DestinationPath "issundb-mcp-${{ matrix.name }}.${{ matrix.archive_ext }}" -Force
          Compress-Archive -Path "target\release\issundb-rest.exe" -DestinationPath "issundb-rest-${{ matrix.name }}.${{ matrix.archive_ext }}" -Force

      - name: Upload issundb-cli
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./issundb-cli-${{ matrix.name }}.${{ matrix.archive_ext }}
          asset_name: issundb-cli-${{ matrix.name }}.${{ matrix.archive_ext }}
          asset_content_type: ${{ matrix.content_type }}

      - name: Upload issundb-mcp
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./issundb-mcp-${{ matrix.name }}.${{ matrix.archive_ext }}
          asset_name: issundb-mcp-${{ matrix.name }}.${{ matrix.archive_ext }}
          asset_content_type: ${{ matrix.content_type }}

      - name: Upload issundb-rest
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./issundb-rest-${{ matrix.name }}.${{ matrix.archive_ext }}
          asset_name: issundb-rest-${{ matrix.name }}.${{ matrix.archive_ext }}
          asset_content_type: ${{ matrix.content_type }}

  build-image:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: call-tests
    if: success()
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase registry owner
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> ${GITHUB_ENV}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.OWNER_LC }}/issundb
          # `latest` is reserved for actual tag pushes; manual workflow_dispatch
          # runs publish under `develop` instead so they cannot overwrite a
          # released image.
          tags: |
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=develop,enable=${{ github.event_name == 'workflow_dispatch' }}
            type=ref,event=tag
          labels: |
            org.opencontainers.image.title=IssunDB
            org.opencontainers.image.description=IssunDB CLI, REST, and MCP server binaries

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
