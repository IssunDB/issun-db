name: Run Tests

on:
  workflow_dispatch:
  schedule: # Run every day at midnight (UTC)
    - cron: '0 0 * * *'
  workflow_call:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'

#concurrency:
#  group: ${{ github.workflow }}-${{ github.ref }}
#  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    env:
      OMP_NUM_THREADS: 1
      NEXTEST_RETRIES: 2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - name: Set up Rust (stable)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, llvm-tools-preview
          cache: true
          cache-key: coverage

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang pkg-config libssl-dev

      - name: Install cargo-nextest and cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9.100,cargo-llvm-cov@0.6.16

      - name: Download test datasets (for integration and E2E tests)
        run: |
          pip install uv
          uv sync --extra dev
          source .venv/bin/activate
          make testdata
        continue-on-error: true

      - name: Run tests and generate coverage report
        run: make coverage

      - name: Run doctests
        run: make doctest

      - name: Run CLI integration tests
        run: make test-cli

      - name: Run openCypher TCK conformance tests
        # This is for preventing regression. The test suite runs every TCK scenario
        # and fails on any new failure beyond the known-gap budget. The budget is
        # the current count of deferred-work failures (26) plus a margin for the
        # handful of rand()-flaky scenarios; lower it as gaps are closed.
        env:
          ISSUNDB_CONFORMANCE: '1'
          ISSUNDB_CONFORMANCE_MAX_FAILURES: '30'
        run: cargo test -p issundb --test conformance -- --nocapture

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
        continue-on-error: true

  msrv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - name: Set up Rust (1.85.0)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: '1.85.0'
          cache: true
          cache-key: msrv

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang pkg-config libssl-dev

      - name: Check that the workspace compiles on the MSRV
        run: cargo check --workspace --all-targets --locked
